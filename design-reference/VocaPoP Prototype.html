<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="VocaPoP" />
<meta name="theme-color" content="#FF5BB8" />
<title>VocaPoP</title>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" rx="40" fill="#FCFDFF"/>
    <g transform="translate(40,40)">
      <rect x="0" y="20" width="120" height="14" rx="7" fill="#FFE3F3"/>
      <rect x="14" y="46" width="106" height="14" rx="7" fill="#FFE3F3"/>
      <rect x="28" y="72" width="92"  height="14" rx="7" fill="#FF5BB8"/>
      <rect x="14" y="98" width="106" height="14" rx="7" fill="#FFE3F3"/>
      <rect x="0" y="124" width="120" height="14" rx="7" fill="#FFE3F3"/>
    </g>
  </svg>
</template>

<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #1a1a1a;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  body {
    display: grid;
    place-items: center;
  }
  #root {
    width: 100%;
    height: 100%;
    background: #FCFDFF;
  }
  /* 데스크탑에선 폰 사이즈로 가운데에 */
  @media (min-width: 500px) {
    #root {
      width: 390px;
      height: min(844px, calc(100vh - 24px));
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.3);
    }
  }
  @keyframes protoFade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes protoSheetUp {
    from { transform: translateY(100%); opacity: .6; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes protoBannerIn {
    0%   { opacity: 0; transform: translateY(-10px) scale(.97); }
    60%  { opacity: 1; transform: translateY(2px) scale(1.01); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes protoPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.14); }
  }
  @keyframes protoMeFlag {
    0%, 100% { transform: rotate(0deg); }
    50%      { transform: rotate(-5deg); }
  }
  button { -webkit-tap-highlight-color: transparent; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="vp-icons.jsx"></script>
<script type="text/babel" src="vp-shared-pink.jsx"></script>
<script src="vp-vocab-data.js"></script>
<script type="text/babel" src="vp-proto-screens-1.jsx"></script>
<script type="text/babel" src="vp-proto-screens-2.jsx"></script>
<script type="text/babel" src="vp-proto-wordbook.jsx"></script>
<script type="text/babel" src="vp-proto-detail.jsx"></script>
<script type="text/babel" src="vp-proto-screens-stats.jsx"></script>
<script type="text/babel" src="vp-proto-notereview.jsx"></script>
<script type="text/babel" src="vp-proto-onboarding.jsx"></script>
<script type="text/babel" src="vp-proto-overlay.jsx"></script>
<script type="text/babel" src="vp-proto-app.jsx"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
function Boot() {
  const [ready, setReady] = React.useState(false);
  React.useEffect(() => {
    const tick = () => {
      if (window.Icon && window.VP && window.VPButton && window.PROTO_WORDS && window.ProtoHome && window.ProtoWordbook && window.ProtoStats && window.ProtoSettings && window.WordDetail && window.ProtoOnboarding && window.ProtoOverlay && window.ProtoApp) {
        setReady(true);
      } else {
        setTimeout(tick, 30);
      }
    };
    tick();
  }, []);
  if (!ready) return null;
  return <window.ProtoApp />;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Boot />);
</script>
</body>
</html>
